  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MC Bedrock Server Manager</title>
    <link
      href="{{ url_for('static', filename='vendor/bootstrap/bootstrap.min.css') }}"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='vendor/bootstrap-icons/bootstrap-icons.min.css') }}"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
    <style>
      /* Critical-only: keep the loading overlay stable before app.css finishes */
      #page-loading-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 1;
        transition: opacity 0.2s ease;
      }
      #page-loading-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .page-loading-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }
      .page-loader {
        position: relative;
        transform: rotateZ(45deg);
        perspective: 1000px;
        border-radius: 50%;
        width: 48px;
        height: 48px;
        color: #9bd6ff;
        display: block;
      }
      .page-loader:before,
      .page-loader:after {
        content: "";
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        width: inherit;
        height: inherit;
        border-radius: 50%;
        transform: rotateX(70deg);
        animation: 1s pageLoaderSpin linear infinite;
      }
      .page-loader:after {
        color: #9bd6ff;
        transform: rotateY(70deg);
        animation-delay: 0.4s;
      }
      @keyframes pageLoaderSpin {
        0%,
        100% {
          box-shadow: 0.2em 0px 0 0px currentcolor;
        }
        12% {
          box-shadow: 0.2em 0.2em 0 0 currentcolor;
        }
        25% {
          box-shadow: 0 0.2em 0 0px currentcolor;
        }
        37% {
          box-shadow: -0.2em 0.2em 0 0 currentcolor;
        }
        50% {
          box-shadow: -0.2em 0 0 0 currentcolor;
        }
        62% {
          box-shadow: -0.2em -0.2em 0 0 currentcolor;
        }
        75% {
          box-shadow: 0px -0.2em 0 0 currentcolor;
        }
        87% {
          box-shadow: 0.2em -0.2em 0 0 currentcolor;
        }
      }
    </style>
  </head>
